<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Science AI Active Learning - โรงเรียนวิวัฒน์วิทยา</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>
    <audio id="bg-music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>
    <audio id="correct-sound"><source src="https://www.myinstants.com/media/sounds/correct.mp3" type="audio/mpeg"></audio>

    <div id="start-screen" class="screen">
        <div class="intro-box">
            <img src="https://cdn-icons-png.flaticon.com/512/2859/2859706.png" class="logo">
            <h1>วิทยาศาสตร์ ป.3</h1>
            <h2>เรื่อง สิ่งมีชีวิต และ สิ่งไม่มีชีวิต</h2>
            <div class="author-info">
                <p>จัดทำโดย</p>
                <h3>นายกิตติ์ธเนศ นิธิกรอุดมวิทย์</h3>
                <p>ผู้อำนวยการโรงเรียนวิวัฒน์วิทยา</p>
            </div>
            <button onclick="startGame()" class="btn-start">เริ่มการเรียนรู้ 🚀</button>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <div class="game-wrapper">
            <video class="input_video" style="display: none;"></video>
            <canvas class="output_canvas" width="800" height="600"></canvas>
            
            <div class="ui-layer">
                <div class="header">
                    <div class="score-card">คะแนน: <span id="score">0</span></div>
                    <div class="title-tag">วิชาวิทยาศาสตร์ 🔬</div>
                </div>
                
                <div id="question-text" class="question-bubble">กำลังเตรียมกล้อง...</div>
                
                <div class="choice-container">
                    <div id="ans-left" class="choice-card left">ซ้าย</div>
                    <div id="ans-right" class="choice-card right">ขวา</div>
                </div>
                
                <div class="footer-hint">💡 เอียงจมูกไปทางคำตอบที่ถูกต้อง!</div>
            </div>
            
            <div id="feedback" class="feedback-msg hidden">เก่งมาก! 🌟</div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
